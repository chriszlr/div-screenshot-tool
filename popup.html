<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Screenshot Tool</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">Chrome Extension</p>
      <h1>Div Screenshot Tool</h1>
      <p class="copy">
        Pick any visible element on the current page and save it as a PNG.
      </p>
      <button id="pick-element" class="primary">Pick element</button>
      <section class="shortcut-card">
        <p class="shortcut-label">Keyboard Shortcut</p>
        <p id="shortcut-value" class="shortcut-value">Loading...</p>
        <button id="open-shortcuts" class="secondary">Set shortcut</button>
        <p class="shortcut-note">Chrome manages keyboard shortcuts centrally at `chrome://extensions/shortcuts`.</p>
      </section>
      <p id="status" class="status">
        This tool works for elements inside the currently visible part of the page.
      </p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
